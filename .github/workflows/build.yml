name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (${{ matrix.name }})
        run: npm run dist
        env:
          # unsigned builds — don't attempt macOS code signing on CI
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: rtk-savings-${{ matrix.name }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rtk-*
          path: release-assets
          merge-multiple: true

      - name: Verify downloaded artifacts
        run: |
          ls -la release-assets
          shopt -s nullglob
          missing=()
          for ext in dmg zip exe AppImage deb; do
            matches=(release-assets/*.${ext})
            if [ ${#matches[@]} -eq 0 ]; then
              missing+=(".${ext}")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing expected release artifacts for: ${missing[*]}"
            echo "Expected file types: .dmg .zip .exe .AppImage .deb"
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          target_commitish: ${{ github.sha }}
          name: Main latest build
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.exe
            release-assets/*.AppImage
            release-assets/*.deb
